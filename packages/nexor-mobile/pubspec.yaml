name: nexor
description: AI-powered mobile coding assistant that connects to OpenCode servers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.0.0

  # HTTP
  dio: ^5.4.0
  http: ^1.1.2

  # URL Launcher
  url_launcher: ^6.2.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # UI
  phosphor_flutter: ^2.1.0
  timeago: ^3.6.0

  # SSH & SFTP
  dartssh2: ^2.13.0
  
  # Database
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0
  
  # Utilities
  uuid: ^4.3.0
  equatable: ^2.0.5
  
  # Code Highlighting
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  
  # Clipboard & Share
  share_plus: ^7.2.2
  
  # File Type Detection
  mime: ^1.0.4
  
  # Markdown
  flutter_markdown: ^0.6.18
  markdown: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  build_runner: ^2.4.8
  drift_dev: ^2.14.0
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0
  flutter_lints: ^3.0.0
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
